<div>
    <button mat-icon-button (click)="back()">
        <mat-icon>arrow_back</mat-icon>
    </button>
</div>

<div class="page">
<mat-card>
    <mat-card-header >
        <mat-card-title>{{labels.loginSeConnecterTitre}}</mat-card-title>
    </mat-card-header>
    
    <form class="mt2"  [formGroup]="myLoginForm" (ngSubmit)="submit()">
        <mat-card-content>
            <mat-form-field appearance="outline" class="" >
                <mat-label>{{labels.loginNomUtilisateurOuEmail}}</mat-label>
                <input matInput formControlName="string">
            </mat-form-field>

            <mat-form-field appearance="outline" class="" >
                <mat-label>{{labels.loginMotDePasse}}</mat-label>
                <input matInput [type]="hide ? 'password' : 'text'" formControlName="pwd">
                <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'"
                    [attr.aria-pressed]="hide">
                    <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
            </mat-form-field>
        </mat-card-content>

        <div class="page">
            <button matButton class="login-custom-btn" >{{labels.loginSeConnecterBouton}}</button>
        </div>
        @if(onError) {
            <div class="page error">An error occurred !</div>
        }
    </form>

</mat-card>
</div>
