<div class="page">

<div class="bigGrid">
    @for(topic of (topic$ | async); track topic.id){
    <div class="gridCell">
        <h2>{{topic.title | uppercase}} </h2>
        <p>{{topic.content | lowercase}}</p>
        <p>
            @if(topic.read){  <button matButton="outlined" class="custom-btn-grey">{{labels.topicDejaAbonne}}</button>  }
            @else { <button matButton="filled" class="custom-btn">{{labels.topicSabonner}}</button> }
        </p>
    </div>
    }
</div>

</div>
