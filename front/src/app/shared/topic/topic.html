<div class="container-fluid" > <!--display_grid_old container-fluid-->
    @if(myOrigin!="me"){
        <div class="row gx-1">
        @for(topic of (topic$ | async); track topic.id){
            <div class="col-xs-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6" > <!-- class="display_cell" class="col-xs-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2 display_cell"-->
                <div class="display_cell">
                <h2>{{topic.title | uppercase}}</h2>
                <p>{{topic.content | lowercase}}</p>
                <p>
                    <button 
                        [id] ="'btnTopic-' + topic.id" 
                        type="button" 
                        [disabled]="topic.read"
                        [ngClass]="{'btn btn-primary-grey':topic.read,'btn btn-primary-custom':!topic.read}"
                        (click)="subscription(topic.id,$event, topic.read)">
                        {{topic.read ? labelsTopic.topicDejaAbonne : labelsTopic.topicSabonner}}
                    </button>
                </p>
                </div>
            </div>
        }
        </div>
    } @else {
        <div class="row gx-1"><!--nothing class="row gx-1"-->
        @for(topic of (topic$ | async); track topic.id){
            @if (topic.read ){
                <div class="col-xs-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6">  <!--class="display_cell" class="col-xs-12 col-md-6 col-lg-4 col-xl-3 col-xxl-2 display_cell"-->
                    <div class="display_cell">
                    <h2>{{topic.title | uppercase}} </h2>
                    <p>{{topic.content | lowercase}}</p>
                    <p>
                        <button 
                            [id] ="'btnTopic-' + topic.id" 
                            type="button" 
                            [ngClass]="{'btn btn-primary-custom':topic.read}"
                            (click)="unsubscription(topic.id,$event, topic.read)">
                            {{topic.read ? labelsMe.meUnsubcribe : ''}}
                        </button>
                    </p>
                    </div>
                </div>
            }
        }
        </div>
    }
</div>
