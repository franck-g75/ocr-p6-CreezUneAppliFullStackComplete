<div class="centred_content_no_margin">
    <div class="long_top_bar_desktop">
        <div class="top_bar_desktop">
        
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary w-100">
        
            <!-- Logo -->
            <div class="container-fluid">
                <a class="navbar-brand" routerLink="" class="top_bar_logo">
                <img
                    src="logo_p6.png"
                    alt="Accueil"
                    loading="lazy"
                />
                </a>

                
                    <!-- Toggle button -->
                    <button class="navbar-toggler" 
                            type="button" 
                            data-bs-toggle="offcanvas" 
                            data-bs-target="#navbarOffcanvasLg" aria-controls="navbarOffcanvasLg" aria-label="Toggle navigation">
                                <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse justify-content-end">
                        <ul class="navbar-nav ">
                            
                        @if(showRight){
                            <li class="nav-item disconnect p-1"><a (click)="disconnect()" [class]="colored_header_disconnect_link">{{labels.headerSeDeconnecter}}</a></li>
                            <li class="nav-item p-1"><a routerLink="article" [class]="colored_header_article_link">{{labels.headerArticle}}</a></li>
                            <li class="nav-item p-1"><a routerLink="theme" [class]="colored_header_theme_link">{{labels.headerTheme}}</a></li>
                            <li class="nav-item p-1"><mat-icon id="account" routerLink="me" [class]="colored_accont_icon">account_circle</mat-icon></li>                
                        }
                        </ul>

                    </div>
                    
                    <!-- Collapsible wrapper -->
                   
                
            </div>
            <!-- Container wrapper -->
         
        </nav>
        <!-- Navbar -->
         

<div class="offcanvas offcanvas-end" tabindex="-1" id="navbarOffcanvasLg" aria-labelledby="offcanvasNavbarLabel">
    <div class="offcanvas-header">
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
        
            <li class="nav-item disconnect p-1">{{labels.headerSeDeconnecter}}</li>
            <li class="nav-item p-1"><a routerLink="article" [class]="colored_header_article_link">{{labels.headerArticle}}</a></li>
            <li class="nav-item p-1"><a routerLink="theme" [class]="colored_header_theme_link">{{labels.headerTheme}}</a></li>
            <li class="nav-item p-1"><mat-icon id="account" routerLink="me" [class]="colored_accont_icon">account_circle</mat-icon></li>                
        
        </ul>

    </div>
</div>


        </div>
    </div>
</div>
